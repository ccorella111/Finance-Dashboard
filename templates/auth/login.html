{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
    <h1 class="text-6xl font-bold text-emerald-400 mb-8 text-center">Financy</h1>

    <div class="bg-gray-800 p-8 rounded-xl border border-gray-700 shadow-lg space-y-6"">
        <h2 class="text-2xl font-bold text-emerald-300 text-center">Inicio de sesión</h2>

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            
            <div>
                <label for="username" class="block text-sm font-medium text-gray-400 mb-2">
                    Usuario
                </label>
                <input
                type="text"
                id="username"
                name="username"
                required
                placeholder="example@mail.com"
                class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition duration-200"
                >
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-400 mb-2">
                    Contraseña
                </label>
                <input
                type="text"
                id="password"
                name="password"
                required
                minlength="8"
                maxlength="15"
                placeholder="Ingrese su contraseña"
                class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition duration-200">
            </div>

            <button type="submit" class="block w-full text-center bg-emerald-500 hover:bg-emerald-600 text-gray-900 font-bold py-3 px-4 rounded-lg transition duration-200 cursor-pointer">
                Ingresar
            </button>

        </form>

        <div class="text-center text-sm text-gray-400 pt-2">
            <span>¿No tienes una cuenta?</span>
            <a href="{% url 'register' %}" class="underline">
                Creala aquí
            </a>
        </div>

    </div>
</div>
{% endblock content %}
