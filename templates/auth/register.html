{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
    <h1 class="text-6xl font-bold text-emerald-400 mb-8 text-center">Financy</h1>

    <div class="bg-gray-800 p-8 rounded-xl border border-gray-700 shadow-lg space-y-6">
        <h2 class="text-2xl font-bold text-emerald-300 text-center">Registro</h2>

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <div>
                <label for="user" class="block text-sm font-medium text-gray-400 mb-2">Nombre de usuario</label>
                <input
                type="text"
                id="user"
                name="user"
                required
                placeholder="Nombre Apellido"
                class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition duration-200">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-400 mb-2">Correo electrónico</label>
                <input
                type="email"
                id="email"
                name="email"
                required
                placeholder="example@mail.com"
                class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition duration-200">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-400 mb-2">Contraseña</label>
                <input
                type="password"
                id="registerPassword"
                name="registerPassword"
                required
                minlength="8"
                maxlength="15"
                placeholder="8 a 15 caracteres"
                class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition duration-200">
            </div>

            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-gray-400 mb-2">Confirmar contraseña</label>
                <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                required
                minlength="8"
                maxlength="15"
                class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition duration-200">
            </div>

            <button type="submit" class="block w-full text-center bg-emerald-500 hover:bg-emerald-600 text-gray-900 font-bold py-3 px-4 rounded-lg transition duration-200 cursor-pointer">Crear cuenta</button>


        </form>
    </div>
</div>
{% endblock content %}
